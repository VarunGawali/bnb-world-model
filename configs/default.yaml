# default.yaml — BnB World Model default hyperparameters
# Override any field via CLI: --model.hidden_dim 64

model:
  hidden_dim: 128
  n_gnn_layers: 3
  n_gnn_heads: 4          # GATv2Conv attention heads (head_dim = hidden_dim // n_gnn_heads)
  n_dyn_layers: 4         # Transformer dynamics depth
  n_dyn_heads: 4          # Transformer attention heads
  max_seq: 512            # maximum B&B trajectory length

training:
  # Epoch numbers are CAPS, not fixed durations: early stopping (patience below)
  # halts each phase when val stops improving and the best checkpoint is kept,
  # so these can be set generously for the 2-day budget without overfitting.
  epochs_phase1: 80     # policy head
  epochs_phase2: 60     # value head
  epochs_phase3: 80     # dynamics Transformer
  overshoot_depth: 3    # Phase 3 latent-overshooting horizon (0 = one-step only)
  epochs_phase4: 60     # joint fine-tuning
  epochs_phase5: 50     # cut selection head
  patience: 10          # early-stop after this many epochs without val improvement
  batch_size: 64
  lr_phase1: 1.0e-3
  lr_phase2: 5.0e-4
  lr_phase3: 5.0e-4
  lr_phase4: 1.0e-4
  lr_phase5: 5.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  amp: true             # automatic mixed precision (GPU only)

data:
  problem: set_cover
  n_rows: 500
  n_cols: 1000
  density: 0.05
  n_instances: 1000
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  max_train_files: null   # set to integer to cap (e.g. 300 for fast experiments)

paths:
  data_root: data/
  checkpoint_dir: checkpoints/
  results_dir: results/

solver:
  time_limit: 300       # seconds per instance
  node_limit: 100000
  gap_tolerance: 1.0e-4
  max_cuts_per_node: 10
  cut_score_threshold: 0.3   # sigmoid threshold for cut acceptance
  lookahead_k: 3             # candidates evaluated with dynamics lookahead
  lookahead_depth: 3         # latent rollout steps per candidate
  lookahead_gamma: 0.95      # discount factor per lookahead step
  # Predicted-subtree-size penalty. GATED OFF (0.0): the collected traces use
  # SCIP's default (non-DFS) node order, so exact subtree_size labels cannot be
  # derived from `depths` (see bnb_wm/data/labels.py) and the SubtreeSizeHead is
  # untrained. Set >0 only with DFS-ordered collection or explicit tree ids.
  size_weight: 0.0
  # Cost-to-go penalty (Gap 3). Predicted remaining nodes (n_steps - t), lower
  # is better. Trainable on the non-DFS traces. Set >0 to branch by cost-to-go;
  # 0 recovers the pure dual-bound-value rollout (the ablation axis).
  ctg_weight: 1.0
  # Rollout branching factor (Gap 4). 1 = single greedy path; >1 expands a
  # predicted branching tree of that width and averages child continuations.
  branch_factor: 2
  # Node selection (Gap 5). "bound" = best-bound (default, LP-bound priority);
  # "cost_to_go" = learned best-first, ordering the frontier by the child's
  # predicted remaining nodes. Order never affects correctness, only speed.
  node_selection: cost_to_go
  # MuZero-style rollout return (Fix 3). true = sum gamma^t r_t + gamma^k V(leaf)
  # using the predicted per-step reward + one leaf value bootstrap; false = sum
  # the value at every step (double-counts; kept as the ablation baseline).
  use_reward_return: true
  # Global search-state context (Gap 1). Injects scalar frontier/bound features
  # into z. GATED OFF: the projection is zero-initialised and the frozen traces
  # lack per-node frontier signals to train it, so it is a no-op until a future
  # run fine-tunes it. Enable only after training the global_proj layer.
  use_global_context: false

benchmark:
  n_instances: 10
  time_limit: 60        # seconds per instance
  problem: set_cover
  lookahead_k: 5             # candidates for dynamics lookahead in benchmark
  lookahead_depth: 3         # latent rollout steps per candidate
  lookahead_gamma: 0.95      # discount factor per lookahead step
  size_weight: 0.0           # gated off: non-DFS traces (see solver.size_weight)
  ctg_weight: 1.0            # cost-to-go penalty in rollout score (Gap 3)
  branch_factor: 2           # rollout tree width (Gap 4); 1 = single path
